<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="icon" type="image/png" href="assets/sunshine-logo.png">
<title>Sunshine Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#7dcea0;--blue:#5dade2;--pink:#e85d7a;--orange:#f39c12;
  --yellow:#f7dc6f;--purple:#9b59b6;--text:#1a1a1a;--muted:#666;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#fff;color:var(--text);min-height:100vh;
}
.header{
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  gap:16px;padding:18px 24px;border-bottom:1px solid #eee;
  background:#fff;position:sticky;top:0;z-index:10;
}
.header-left{display:flex;align-items:center;gap:14px;min-width:0}
.logo-wrap{display:flex;flex-direction:column;gap:4px;min-width:0}
.logo-wrap img{height:36px;width:auto;object-fit:contain}
.biz-name-sm{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.header-center{text-align:center}
.biz-title{font-size:clamp(22px,4vw,34px);font-weight:700;color:var(--text);letter-spacing:-.02em}
.header-right{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.hdr-btn{
  border:1px solid #e5e5e5;background:#fff;border-radius:999px;
  padding:8px 12px;font-size:12px;cursor:pointer;display:inline-flex;
  align-items:center;gap:6px;color:var(--muted);transition:all .15s;
}
.hdr-btn:hover{border-color:#e85d7a;color:#e85d7a}
.clock-box{text-align:right;font-size:12px;color:var(--muted);line-height:1.4;min-width:120px}
.clock-time{font-size:15px;font-weight:600;color:var(--text)}
.lang-popup{
  position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #e5e5e5;
  border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:8px;display:none;
  min-width:160px;z-index:20;
}
.lang-popup.on{display:block}
.lang-item{
  padding:10px 12px;border-radius:8px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;gap:8px;
}
.lang-item:hover,.lang-item.on{background:#fdf0f3;color:#b8334f}
.lang-wrap{position:relative}
.main{
  max-width:980px;margin:0 auto;padding:36px 20px 48px;
}
.grid{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:28px 24px;
}
.tile{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  text-decoration:none;color:inherit;
}
.circle{
  width:clamp(120px,22vw,168px);height:clamp(120px,22vw,168px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;
  transition:transform .18s ease,box-shadow .18s ease;cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}
.circle i{font-size:clamp(34px,6vw,48px);color:#fff}
.circle:hover{transform:scale(1.05);box-shadow:0 14px 32px rgba(0,0,0,.14)}
.circle.mint{background:linear-gradient(145deg,#8fd9b3,var(--mint))}
.circle.blue{background:linear-gradient(145deg,#7ec8ef,var(--blue))}
.circle.pink{background:linear-gradient(145deg,#f07d96,var(--pink))}
.circle.orange{background:linear-gradient(145deg,#f5ab35,var(--orange))}
.circle.yellow{background:linear-gradient(145deg,#f9e79f,var(--yellow));border:2px dashed #d4ac0d}
.circle.yellow i{color:#7d6608}
.circle.purple{background:linear-gradient(145deg,#b07cc6,var(--purple));border:2px dashed #6c3483}
.tile-label{font-size:14px;font-weight:600;color:var(--text);text-align:center}
.badge{
  position:absolute;top:10px;right:10px;min-width:24px;height:24px;padding:0 6px;
  border-radius:999px;background:#fff;color:#185a32;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.site-footer{
  text-align:center;padding:24px 16px 32px;font-size:11px;color:#999;
  border-top:1px solid #f0f0f0;margin-top:24px;
}
@media (max-width:760px){
  .header{grid-template-columns:1fr;gap:12px}
  .header-center{order:-1}
  .header-right{justify-content:space-between;width:100%}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:22px 16px}
}
@media (max-width:420px){
  .grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="assets/sunshine-logo.png" alt="Sunshine" id="dash-logo">
    </div>
    <div class="biz-name-sm" id="biz-name-side">Sunshine Spa</div>
  </div>
  <div class="header-center">
    <div class="biz-title" id="biz-name-center">Sunshine Spa</div>
  </div>
  <div class="header-right">
    <div class="lang-wrap">
      <button class="hdr-btn" id="lang-btn" type="button">
        <i class="ti ti-language"></i><span id="lang-label">EN</span>
      </button>
      <div class="lang-popup" id="lang-popup"></div>
    </div>
    <button class="hdr-btn" type="button" onclick="doLogout()">
      <i class="ti ti-logout"></i><span data-i18n="logout">Log out</span>
    </button>
    <div class="clock-box">
      <div class="clock-time" id="clock-time">--:--</div>
      <div id="clock-date">--</div>
    </div>
  </div>
</header>

<main class="main">
  <div class="grid">
    <a class="tile" href="index.html#booking" id="tile-calendar">
      <div class="circle mint">
        <span class="badge" id="booking-badge" style="display:none">0</span>
        <i class="ti ti-calendar"></i>
      </div>
      <div class="tile-label" data-i18n="calendar">Calendar</div>
    </a>
    <a class="tile" href="index.html#display">
      <div class="circle blue"><i class="ti ti-layout-board"></i></div>
      <div class="tile-label" data-i18n="queue">Queue Display</div>
    </a>
    <a class="tile" href="employee.html">
      <div class="circle pink"><i class="ti ti-users"></i></div>
      <div class="tile-label" data-i18n="employees">Employees</div>
    </a>
    <a class="tile" href="index.html#sales">
      <div class="circle orange"><i class="ti ti-chart-bar"></i></div>
      <div class="tile-label" data-i18n="sales">Sale Summary</div>
    </a>
    <a class="tile" href="index.html#payroll">
      <div class="circle yellow"><i class="ti ti-cash"></i></div>
      <div class="tile-label" data-i18n="payroll">Payroll Summary</div>
    </a>
    <a class="tile" href="index.html#settings">
      <div class="circle purple"><i class="ti ti-settings"></i></div>
      <div class="tile-label" data-i18n="settings">Setting</div>
    </a>
  </div>
</main>

<footer class="site-footer">Powered by Sunshine Evolution Technology LLC</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://bjzhmdpuzfbpkvohntjx.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqemhtZHB1emZicGt2b2hudGp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTMyNTEsImV4cCI6MjA5NTU2OTI1MX0.9TkTHUbwFY7MbL6yrv32-5mJfjkVk04TV6QX8LnpQnE';
let sb=null;
let currentLang='en';

const I18N={
  en:{logout:'Log out',calendar:'Calendar',queue:'Queue Display',employees:'Employees',sales:'Sale Summary',payroll:'Payroll Summary',settings:'Setting'},
  th:{logout:'ออกจากระบบ',calendar:'ปฏิทิน',queue:'จอแสดงผล',employees:'พนักงาน',sales:'สรุปยอดขาย',payroll:'สรุปเงินเดือน',settings:'ตั้งค่า'},
  es:{logout:'Salir',calendar:'Calendario',queue:'Cola',employees:'Empleados',sales:'Resumen ventas',payroll:'Resumen nómina',settings:'Ajustes'},
  zh:{logout:'退出',calendar:'日历',queue:'排队显示',employees:'员工',sales:'销售摘要',payroll:'薪资摘要',settings:'设置'}
};
const LANGS=[
  {k:'en',f:'🇺🇸',n:'English'},
  {k:'th',f:'🇹🇭',n:'ภาษาไทย'},
  {k:'es',f:'🇪🇸',n:'Español'},
  {k:'zh',f:'🇨🇳',n:'中文'}
];

function t(key){return (I18N[currentLang]&&I18N[currentLang][key])||I18N.en[key]||key}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n)});
  const opt=LANGS.find(o=>o.k===currentLang)||LANGS[0];
  document.getElementById('lang-label').textContent=opt.f+' '+opt.k.toUpperCase();
}
function setLang(code){
  currentLang=code;
  localStorage.setItem('sunshine_lang',code);
  applyLang();
  document.getElementById('lang-popup').classList.remove('on');
}
function buildLangPopup(){
  document.getElementById('lang-popup').innerHTML=LANGS.map(o=>
    `<div class="lang-item ${currentLang===o.k?'on':''}" onclick="setLang('${o.k}')"><span>${o.f}</span>${o.n}</div>`
  ).join('');
}
function pad2(n){return String(n).padStart(2,'0')}
function updateClock(){
  const now=new Date();
  document.getElementById('clock-time').textContent=`${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
  document.getElementById('clock-date').textContent=now.toLocaleDateString(
    currentLang==='th'?'th-TH':currentLang==='zh'?'zh-CN':currentLang==='es'?'es-ES':'en-US',
    {weekday:'short',year:'numeric',month:'short',day:'numeric'}
  );
}
function doLogout(){
  sessionStorage.removeItem('sunshine_user');
  window.location.href='index.html';
}
function requireAuth(){
  if(!sessionStorage.getItem('sunshine_user')){
    window.location.href='index.html';
    return false;
  }
  return true;
}
function setBusinessName(name){
  const label=name||'Sunshine Spa';
  document.getElementById('biz-name-side').textContent=label;
  document.getElementById('biz-name-center').textContent=label;
  document.title=label+' | Dashboard';
}
async function loadDashboardData(){
  try{
    const {data,error}=await sb.from('businesses').select('business_name').limit(1).maybeSingle();
    if(!error&&data?.business_name)setBusinessName(data.business_name);
  }catch(e){console.error('businesses:',e)}

  try{
    const today=new Date();
    const iso=`${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;
    const {count,error}=await sb.from('bookings').select('*',{count:'exact',head:true}).eq('booking_date',iso);
    if(!error&&count!=null){
      const badge=document.getElementById('booking-badge');
      badge.textContent=count;
      badge.style.display=count>0?'flex':'none';
    }
  }catch(e){console.error('bookings count:',e)}
}
async function init(){
  if(!requireAuth())return;
  const savedLang=localStorage.getItem('sunshine_lang');
  if(savedLang&&I18N[savedLang])currentLang=savedLang;
  buildLangPopup();
  applyLang();
  updateClock();
  setInterval(updateClock,1000);
  document.getElementById('lang-btn').addEventListener('click',e=>{
    e.stopPropagation();
    document.getElementById('lang-popup').classList.toggle('on');
  });
  document.addEventListener('click',()=>document.getElementById('lang-popup').classList.remove('on'));

  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  await loadDashboardData();
}
init();
</script>
</body>
</html>
